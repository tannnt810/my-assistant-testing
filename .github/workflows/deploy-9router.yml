name: Deploy 9Router
on: 
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Clone code trực tiếp từ repo gốc của 9Router
      - name: Clone 9Router Source
        run: |
          git clone https://github.com/decolua/9router .
          
      # 2. Cài đặt môi trường Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3. Cài đặt các thư viện cần thiết
      - name: Install Dependencies
        run: npm install

      # 4. Deploy lên Cloudflare của BẠN
      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name 9router-worker
